services:
  # Nextcloud - File Hosting Service
  nextcloud:
    container_name: nextcloud
    image: nextcloud:latest
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      - nextcloud-db
    networks:
      - reverse_proxy
    volumes:
      - $DOCKERDIR/appdata/nextcloud/php.ini:/usr/local/etc/php/php.ini
      - $DOCKERDIR/data/nextcloud:/var/www/html
      - $DOCKERDIR/data:/mnt/data
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/nextcloud_db_password
      NEXTCLOUD_TRUSTED_DOMAINS: cloud.$DOMAINNAME
      TRUSTED_PROXIES: 192.168.90.0/24
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://cloud.$DOMAINNAME
      OVERWRITEHOST: cloud.$DOMAINNAME
      PHP_UPLOAD_LIMIT: 16G
    secrets:
      - nextcloud_db_password
    labels:
      ### Traefik
      - "traefik.enable=true"
      # HTTP Routers
      - "traefik.http.routers.nextcloud-rtr.entrypoints=websecure"
      - "traefik.http.routers.nextcloud-rtr.rule=Host(`cloud.$DOMAINNAME`)"
      # Middlewares
      - "traefik.http.routers.nextcloud-rtr.middlewares=chain-no-auth@file"
      # HTTP Services
      - "traefik.http.routers.nextcloud-rtr.service=nextcloud-svc"
      - "traefik.http.services.nextcloud-svc.loadbalancer.server.port=80"
      ### Homepage
      - "homepage.group=Media"
      - "homepage.name=Nextcloud"
      - "homepage.icon=nextcloud.png"
      - "homepage.href=https://cloud.$DOMAINNAME"
      - "homepage.description=File Hosting Service"
      - "homepage.widget.type=nextcloud"
      - "homepage.widget.url=http://nextcloud:80"
      - "homepage.widget.key={{HOMEPAGE_FILE_NEXTCLOUD_KEY}}"

  # Nextcloud Database - MariaDB
  nextcloud-db:
    container_name: nextcloud-db
    image: mariadb:10.6
    security_opt:
      - no-new-privileges:true
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: unless-stopped
    networks:
      - reverse_proxy
    volumes:
      - $DOCKERDIR/appdata/nextcloud-db:/var/lib/mysql
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/nextcloud_db_password
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    secrets:
      - nextcloud_db_password

