services:
  # AudioMuse-AI Redis - task queue
  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    volumes:
      - $DOCKERDIR/appdata/audiomuse-ai/redis:/data

  # AudioMuse-AI Postgres - metadata storage
  audiomuse-db:
    image: postgres:15-alpine
    container_name: audiomuse-db
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    environment:
      TZ: $TZ
      POSTGRES_USER: audiomuse
      POSTGRES_PASSWORD: audiomuse
      POSTGRES_DB: audiomuse-db
    volumes:
      - $DOCKERDIR/appdata/audiomuse-ai/postgres:/var/lib/postgresql/data

  # AudioMuse-AI - Flask app
  audiomuse-ai:
    image: ghcr.io/neptunehub/audiomuse-ai:latest-noavx2
    container_name: audiomuse-ai
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    networks:
      - reverse_proxy
      - default
    environment:
      SERVICE_TYPE: "flask"
      TZ: $TZ
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: $NAVIDROME_URL
      NAVIDROME_USER: $NAVIDROME_USER
      NAVIDROME_PASSWORD: $NAVIDROME_PASSWORD
      POSTGRES_USER: audiomuse
      POSTGRES_PASSWORD: audiomuse
      POSTGRES_DB: audiomuse-db
      POSTGRES_HOST: audiomuse-db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://audiomuse-redis:6379/0
      AI_MODEL_PROVIDER: ollama
      OLLAMA_SERVER_URL: http://ollama:11434/api/generate
      # OLLAMA_MODEL_NAME: qwen2.5:3b
    volumes:
      - $DOCKERDIR/appdata/audiomuse-ai/temp/flask:/app/temp_audio
    depends_on:
      - audiomuse-redis
      - audiomuse-db
      - ollama
    labels:
      ### Traefik
      - "traefik.enable=true"
      # HTTP Routers
      - "traefik.http.routers.audiomuse-ai-rtr.entrypoints=websecure"
      - "traefik.http.routers.audiomuse-ai-rtr.rule=Host(`audiomuse.$DOMAINNAME`)"
      # Middlewares
      - "traefik.http.routers.audiomuse-ai-rtr.middlewares=chain-oauth@file"
      # HTTP Services
      - "traefik.http.routers.audiomuse-ai-rtr.service=audiomuse-ai-svc"
      - "traefik.http.services.audiomuse-ai-svc.loadbalancer.server.port=8000"
      ### Homepage
      - "homepage.group=Complementary"
      - "homepage.name=AudioMuse-AI"
      - "homepage.icon=music.png"
      - "homepage.href=https://audiomuse.$DOMAINNAME"
      - "homepage.description=Audio similarity for Navidrome"

  # AudioMuse-AI - RQ worker
  audiomuse-ai-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest-noavx2
    container_name: audiomuse-ai-worker
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    networks:
      - reverse_proxy
      - default
    environment:
      SERVICE_TYPE: "worker"
      TZ: $TZ
      MEDIASERVER_TYPE: "navidrome"
      NAVIDROME_URL: $NAVIDROME_URL
      NAVIDROME_USER: $NAVIDROME_USER
      NAVIDROME_PASSWORD: $NAVIDROME_PASSWORD
      POSTGRES_USER: audiomuse
      POSTGRES_PASSWORD: audiomuse
      POSTGRES_DB: audiomuse-db
      POSTGRES_HOST: audiomuse-db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://audiomuse-redis:6379/0
      AI_MODEL_PROVIDER: ollama
      OLLAMA_SERVER_URL: http://ollama:11434/api/generate
      # OLLAMA_MODEL_NAME: qwen2.5:3b
    volumes:
      - $DOCKERDIR/appdata/audiomuse-ai/temp/worker:/app/temp_audio
    depends_on:
      - audiomuse-redis
      - audiomuse-db
      - ollama

