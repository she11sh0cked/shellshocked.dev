services:
  # llama.cpp - local LLM backend
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    environment:
      TZ: $TZ
      LLAMA_ARG_HF_REPO: $LLAMA_CPP_HF_MODEL
      LLAMA_ARG_ALIAS: $LLAMA_CPP_MODEL_NAME
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_CTX_SIZE: $LLAMA_CPP_CTX_SIZE
      LLAMA_ARG_N_PARALLEL: $LLAMA_CPP_PARALLEL
      LLAMA_API_KEY: $LLAMA_CPP_API_KEY
    volumes:
      - $DOCKERDIR/data/llama-cpp:/root/.cache

  # Open WebUI - Web UI for local LLMs (llama.cpp)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "complementary", "all"]
    networks:
      - reverse_proxy
      - default
    environment:
      TZ: $TZ
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: "http://llama-cpp:8080/v1"
      OPENAI_API_KEY: $LLAMA_CPP_API_KEY
      TASK_MODEL_EXTERNAL: $LLAMA_CPP_MODEL_NAME
      WEBUI_AUTH: "false"
    volumes:
      - $DOCKERDIR/appdata/open-webui:/app/backend/data
    depends_on:
      - llama-cpp
    labels:
      ### Traefik
      - "traefik.enable=true"
      # HTTP Routers
      - "traefik.http.routers.open-webui-rtr.entrypoints=websecure"
      - "traefik.http.routers.open-webui-rtr.rule=Host(`openwebui.$DOMAINNAME`)"
      # Middlewares
      - "traefik.http.routers.open-webui-rtr.middlewares=chain-oauth@file"
      # HTTP Services
      - "traefik.http.routers.open-webui-rtr.service=open-webui-svc"
      - "traefik.http.services.open-webui-svc.loadbalancer.server.port=8080"
      ### Homepage
      - "homepage.group=Complementary"
      - "homepage.name=Open WebUI"
      - "homepage.icon=openwebui.png"
      - "homepage.href=https://openwebui.$DOMAINNAME"
      - "homepage.description=Local LLM Web UI"
